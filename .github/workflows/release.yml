name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/portable-app:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/portable-app:latest

      - name: Build and push pod-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/pod-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/portable-pod-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/portable-pod-server:latest

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login Helm to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: helm package deploy/helm/portable --version "${{ steps.version.outputs.version }}" --app-version "${{ steps.version.outputs.version }}"

      - name: Push Helm chart to GHCR
        run: helm push portable-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

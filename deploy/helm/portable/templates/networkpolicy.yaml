apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "portable.fullname" . }}-project-isolation
  labels:
    {{- include "portable.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: portable.dev/project
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "portable.selectorLabels" . | nindent 14 }}
      ports:
        - port: 3000
          protocol: TCP
        - port: 3001
          protocol: TCP

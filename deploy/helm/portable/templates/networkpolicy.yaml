apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "portable.fullname" . }}-project-isolation
  labels:
    {{- include "portable.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: portable
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "portable.selectorLabels" . | nindent 14 }}
      ports:
        - port: 3000
          protocol: TCP
        - port: 3001
          protocol: TCP

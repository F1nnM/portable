apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "portable.fullname" . }}
  labels:
    {{- include "portable.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - persistentvolumeclaims
      - services
    verbs:
      - create
      - get
      - list
      - watch
      - delete

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portable.fullname" . }}
  labels:
    {{- include "portable.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "portable.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portable.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "portable.serviceAccountName" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.database.existingSecret.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name }}
                  key: {{ .Values.database.existingSecret.key }}
            {{- else }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "portable.secretName" . }}
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgres://portable:$(POSTGRES_PASSWORD)@{{ include "portable.postgres.fullname" . }}:5432/portable"
            {{- end }}
            - name: NUXT_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "portable.secretName" . }}
                  key: github-client-id
            - name: NUXT_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "portable.secretName" . }}
                  key: github-client-secret
            - name: NUXT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "portable.secretName" . }}
                  key: encryption-key
            - name: NUXT_BASE_URL
              value: {{ .Values.baseUrl | default (printf "%s://%s" (ternary "https" "http" .Values.certManager.enabled) .Values.domain) | quote }}
            - name: NUXT_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NUXT_POD_SERVER_IMAGE
              value: "{{ .Values.podServer.image.repository }}:{{ .Values.podServer.image.tag }}"
          envFrom:
            - configMapRef:
                name: {{ include "portable.configMapName" . }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "portable.postgres.fullname" . }}
  labels:
    {{- include "portable.postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "portable.postgres.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "portable.postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portable.postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: portable
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "portable.secretName" . }}
                  key: postgres-password
            - name: POSTGRES_DB
              value: portable
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - portable
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - portable
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}

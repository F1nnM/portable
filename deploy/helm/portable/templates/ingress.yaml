apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "portable.fullname" . }}
  labels:
    {{- include "portable.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.certManager.enabled }}
  tls:
    - hosts:
        - {{ .Values.domain | quote }}
        - {{ printf "*.%s" .Values.domain | quote }}
      secretName: {{ include "portable.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "portable.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
    - host: {{ printf "*.%s" .Values.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "portable.fullname" . }}
                port:
                  number: {{ .Values.service.port }}

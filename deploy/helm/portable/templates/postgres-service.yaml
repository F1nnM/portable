{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "portable.postgres.fullname" . }}
  labels:
    {{- include "portable.postgres.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "portable.postgres.selectorLabels" . | nindent 4 }}
{{- end }}
